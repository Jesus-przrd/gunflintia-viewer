<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gunflintia sp. — SCH-55-22B-004 · evostitch-ysp</title>
<style>
  html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
  #c { width: 100%; height: 100%; display: block; touch-action: none; }
  #label {
    position: fixed; top: 16px; left: 16px;
    color: #eee; font-family: -apple-system, sans-serif; font-size: 14px;
    background: rgba(0,0,0,0.35); padding: 8px 14px; border-radius: 8px;
    pointer-events: none;
  }
  #label .sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #ccc; font-family: -apple-system, sans-serif; font-size: 15px;
    background: #111; transition: opacity 0.4s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">Gunflintia sp.<div class="sub">Muestra SCH-55-22B-004 · arrastra para rotar, dos dedos/click derecho para desplazar</div></div>
<div id="loading">Cargando modelo…</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

function loadSkyTexture(url, opacity, blurPx) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const size = 1024;
      const cnv = document.createElement('canvas');
      cnv.width = size; cnv.height = size;
      const ctx = cnv.getContext('2d');
      ctx.fillStyle = '#141210';
      ctx.fillRect(0, 0, size, size);
      ctx.globalAlpha = opacity;
      ctx.filter = `blur(${blurPx}px)`;
      const scale = Math.max(size / img.width, size / img.height) * 1.15;
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      const tex = new THREE.CanvasTexture(cnv);
      tex.colorSpace = THREE.SRGBColorSpace;
      resolve(tex);
    };
    img.onerror = reject;
    img.src = url;
  });
}

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(0, 0, 5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = true;
controls.screenSpacePanning = true;
controls.panSpeed = 1.2;
controls.rotateSpeed = 0.8;
controls.autoRotateSpeed = 1.0;

let idleTimer = null;
function armIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { controls.autoRotate = true; }, 5000);
}
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  if (idleTimer) clearTimeout(idleTimer);
});
controls.addEventListener('end', armIdleTimer);
armIdleTimer();

const noiseGLSL = `
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise3(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute(permute(permute(
             i.z + vec4(0.0, i1.z, i2.z, 1.0))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0))
           + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3, p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
float fbm3(vec3 p){
  float f=0.0;
  f+=0.5000*snoise3(p); p*=2.02;
  f+=0.2500*snoise3(p); p*=2.03;
  f+=0.1250*snoise3(p); p*=2.01;
  f+=0.0625*snoise3(p);
  return f/0.9375;
}
float pattern3(vec3 p, float warp){
  vec3 q = vec3(fbm3(p+vec3(0.0)), fbm3(p+vec3(5.2,1.3,2.1)), fbm3(p+vec3(3.1,4.7,1.9)));
  vec3 r = vec3(fbm3(p+warp*q+vec3(1.7,9.2,3.3)), fbm3(p+warp*q+vec3(8.3,2.8,5.5)), fbm3(p+warp*q+vec3(4.1,6.6,7.7)));
  return fbm3(p+warp*r);
}
`;

const cytoplasmMaterial = new THREE.ShaderMaterial({
  uniforms: { uPatternScale: { value: 1.0 } },
  vertexShader: `
    varying vec3 vNormal; varying vec3 vViewDir; varying vec3 vWorldPos;
    void main() {
      vec4 worldPosition = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPosition.xyz;
      vNormal = normalize(normalMatrix * normal);
      vViewDir = cameraPosition - worldPosition.xyz;
      gl_Position = projectionMatrix * viewMatrix * worldPosition;
    }
  `,
  fragmentShader: `
    ${noiseGLSL}
    uniform float uPatternScale;
    varying vec3 vNormal; varying vec3 vViewDir; varying vec3 vWorldPos;
    void main() {
      vec3 p = vWorldPos * uPatternScale;
      vec3 N = normalize(vNormal);
      vec3 V = normalize(vViewDir);
      float fresnel = pow(1.0 - max(dot(V, N), 0.0), 2.0);
      vec3 parallax = V * 0.12 * fresnel;
      float cloud = pattern3(p, 1.0);
      float windowMask = smoothstep(-0.22, 0.20, cloud);
      float inner = pattern3((p + parallax) * 1.6 + 31.0, 4.0);
      float reveal = smoothstep(-0.1, 0.5, inner) * (0.35 + 0.65 * fresnel);
      float grain = fbm3(p * 7.0) * 0.035;
      vec3 baseGreen  = vec3(0.02, 0.30, 0.11);
      vec3 cloudGreen = vec3(0.17, 0.26, 0.13);
      vec3 innerBlue  = vec3(0.26, 0.30, 0.46);
      vec3 color = mix(baseGreen, cloudGreen, windowMask);
      color += grain;
      color = mix(color, innerBlue, windowMask * reveal);
      gl_FragColor = vec4(color, 1.0);
    }
  `
});

function resize() {
  const rect = canvas.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false);
  camera.aspect = rect.width / Math.max(rect.height, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

const loader = new GLTFLoader();
loader.load('models/gunflintia_001.glb', (gltf) => {
  const model = gltf.scene;

  model.traverse((obj) => {
    if (obj.isMesh && obj.name === 'gunflintia_citoplasm') {
      obj.material = cytoplasmMaterial;
    }
  });

  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;

  cytoplasmMaterial.uniforms.uPatternScale.value = 9.0 / maxDim;

  const keyLight = new THREE.DirectionalLight(0xfff2d8, 3.2);
  keyLight.position.set(center.x + maxDim * 0.55, center.y + maxDim * 0.5, center.z + maxDim * 0.35);
  keyLight.target.position.copy(center);
  scene.add(keyLight, keyLight.target);

  const fillLight = new THREE.DirectionalLight(0xaec8ff, 1.1);
  fillLight.position.set(center.x - maxDim * 0.5, center.y - maxDim * 0.25, center.z - maxDim * 0.6);
  fillLight.target.position.copy(center);
  scene.add(fillLight, fillLight.target);

  loadSkyTexture('img/gunflint-sample-bg.jpg', 0.35, 26).then((tex) => {
    const skyGeo = new THREE.SphereGeometry(maxDim * 8, 32, 24);
    const skyMat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, depthWrite: false, fog: false });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    sky.position.copy(center);
    scene.add(sky);
  }).catch(() => { /* background is decorative — proceed without it if it fails to load */ });

  controls.target.copy(center);
  camera.position.copy(center).add(new THREE.Vector3(size.x * 0.55, size.z * 2.5, size.z * 2.0));
  camera.near = maxDim / 1000;
  camera.far = maxDim * 100;
  camera.updateProjectionMatrix();
  controls.minDistance = maxDim * 0.05;
  controls.maxDistance = maxDim * 6;
  controls.update();

  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => document.getElementById('loading').style.display = 'none', 400);
}, undefined, (err) => {
  document.getElementById('loading').textContent = 'No se pudo cargar el modelo. Intenta recargar la página.';
  console.error('Error loading model:', err);
});

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
animate();
</script>
</body>
</html>
